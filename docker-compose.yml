version: "3.9"

# =============================================================
#  SISTEMA DE DIAGNÓSTICO DAS SECRETARIAS
#  Docker Compose — desenvolvimento e produção
#
#  Serviços:
#    postgres  → banco de dados PostgreSQL
#    backend   → API NestJS (porta 3001)
#    frontend  → Next.js (porta 3000)
#    nginx     → proxy reverso (porta 80)
#
#  Como usar:
#    Desenvolvimento:  docker compose up --build
#    Produção:         docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  Primeiro uso:
#    1. Copie .env.example para .env e preencha as variáveis
#    2. docker compose up --build
#    3. docker compose exec backend npx prisma migrate dev --name init
#    4. docker compose exec backend npx prisma db seed
# =============================================================

services:

  # ============================================================
  #  POSTGRES
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: diag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diagnostico}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"         # expõe localmente para acesso via DBeaver/TablePlus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-diagnostico}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diag_network

  # ============================================================
  #  BACKEND — NestJS
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: diag_backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-diagnostico}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000,http://localhost:3004}
      PORT: 3001
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main"
    networks:
      - diag_network

  # ============================================================
  #  FRONTEND — Next.js
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    container_name: diag_frontend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    networks:
      - diag_network

  # ============================================================
  #  NGINX — proxy reverso
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: diag_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - diag_network

# =============================================================
#  VOLUMES
# =============================================================
volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local

# =============================================================
#  REDE
# =============================================================
networks:
  diag_network:
    driver: bridge
